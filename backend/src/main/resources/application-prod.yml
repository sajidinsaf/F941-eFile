server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/f941efile?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  name: F941 eFile
  frontend-url: https://irs941.visibleai.com

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000

  encryption:
    key: ${ENCRYPTION_KEY}

  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    verify-url: https://challenges.cloudflare.com/turnstile/v0/siteverify

  mef:
    base-url: ${MEF_BASE_URL:https://irs941.visibleai.com/mock-mef}
    etin: ${MEF_ETIN:}

  payment:
    filing-fee: ${FILING_FEE:4.99}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.f941efile: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
